<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="base.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
  <title>Franklin Liu</title>
  <style>
    .projects-header {
      max-width: 1080px;
      margin: 0 auto;
      padding: 40px 16px 24px;
      text-align: left;
    }

    .projects-header h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.03em;
      color: #1f2937;
    }

    .container {
      display: block;
    }

    .project-grid {
      display: grid;
      gap: 1.25rem;
      grid-template-columns: repeat(auto-fit, minmax(260px, 260px));
      justify-content: center;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 16px 40px;
      grid-auto-rows: auto;
    }

    .project {
      display: flex;
      flex-direction: column;
      width: 260px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 220ms cubic-bezier(0.2, 0.7, 0.2, 1), box-shadow 220ms ease, border-color 220ms ease;
      min-width: 0;
    }

    .project:hover,
    .project:focus-visible {
      transform: translateY(-4px);
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
      border-color: #333;
    }

    .project__art {
      position: relative;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      background: #f8fafc;
    }

    .project__art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 220ms ease;
    }

    .project:hover .project__art img {
      transform: scale(1.03);
    }

    .project__body {
      padding: 1.25rem 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .project__title {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: #111827;
    }

    .project__desc {
      margin: 0;
      line-height: 1.7;
      color: #475569;
      font-size: 0.96rem;
    }

    .project__meta {
      margin-top: auto;
      font-size: 0.85rem;
      color: #64748b;
    }

    @media (max-width: 640px) {
      main {
        padding: 0;
      }

      .projects-header {
        padding-top: 24px;
      }

      .project__body {
        padding: 1rem;
      }

      footer {
        position: static;
      }
    }
  </style>
</head>

<body>
  <div class="social-icons">
    <a href="https://franklinliu.com"><i class="fa fa-chevron-left fa-2x"></i></a>
  </div>

  <div class="container">
    <main>
      <header class="projects-header">
        <h1>Projects</h1>
      </header>

      <section class="project-grid" >
        <a href="https://liufran1.github.io/EmissionsTreemap/" class="project">
          <div class="project__art">
            <img src="images/emissions_treemap.png" alt="Emissions Treemap preview">
          </div>
          <div class="project__body">
            <h2 class="project__title">Emissions Treemap</h2>
            <p class="project__desc">Breakdown of global greenhouse gas emissions by sector and country.</p>
            </div>
        </a>

        <a href="https://liufran1.github.io/VietnamMotorbikes/" class="project">
          <div class="project__art">
            <img src="images/vietnam_motorbikes.jpg" alt="Vietnam motorbikes project preview">
          </div>
          <div class="project__body">
            <h2 class="project__title">Vietnam Motorbikes</h2>
            <p class="project__desc">A look into motorbikes and the environment in Vietnam.</p>
            </div>
        </a>

        <a href="https://observablehq.com/@liufran1" class="project">
          <div class="project__art">
            <img src="images/dataviz_preview.png" alt="Observable data visualization preview">
          </div>
          <div class="project__body">
            <h2 class="project__title">Observable Visualizations</h2>
            <p class="project__desc">Data visualizations hosted on Observable.</p>
            </div>
        </a>
      </section>

    </main>
  </div>

  <footer>
    <div class="social-icons">
      <a href="https://www.linkedin.com/in/liufranklin" target="_blank"><i class="fab fa-linkedin fa-2x"></i></a>
      <a href="https://github.com/liufran1" target="_blank"><i class="fab fa-github fa-2x"></i></a>
    </div>
  </footer>
</body>

</html>
